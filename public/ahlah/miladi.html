<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        .container {
            width: min(100% - 24px, 980px);
            margin-inline: auto;
            padding: 18px 0 28px;
        }

        .date-info {
            background: rgba(255, 255, 255, 0.92);
            box-shadow: 0 10px 30px rgba(27, 94, 32, 0.12);
            padding: 16px;
            border-radius: 18px;
            margin: 0 auto 18px;
            text-align: center;
            direction: rtl;
            border: 1px solid rgba(201, 168, 76, 0.25);
        }
        
        .date-info p {
            margin: 6px 0;
            font-size: clamp(15px, 3.8vw, 18px);
            color: #2E7D32;
            font-weight: 700;
            line-height: 1.7;
        }

        .calendar {
            margin: 0 auto;
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.94);
            border-radius: 22px;
            box-shadow: 0 14px 40px rgba(27, 94, 32, 0.14);
            padding: 18px;
            direction: rtl;
            overflow: hidden;
            border: 1px solid rgba(201, 168, 76, 0.25);
        }
        
        .month-navigation {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 10px;
            align-items: center;
            margin-bottom: 15px;
            direction: rtl;
        }
        
        .month-navigation button {
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 15px;
            font-family: inherit;
            font-weight: 700;
            box-shadow: 0 8px 18px rgba(46, 125, 50, 0.20);
            white-space: nowrap;
        }
        
        .month-navigation button:hover {
            filter: brightness(1.05);
        }
        
        .month-navigation .current-month {
            font-size: clamp(17px, 4.5vw, 23px);
            font-weight: 800;
            color: #2E7D32;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 130px;
            text-align: center;
        }

        .calendar-table-wrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 16px;
        }
        
        .calendar table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 4px;
            table-layout: fixed;
            min-width: 0;
        }
        
        .calendar th, .calendar td {
            text-align: center;
            border: 0;
            border-radius: 12px;
        }
        
        .calendar th {
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            color: white;
            font-weight: 700;
            padding: 10px 4px;
            font-size: clamp(11px, 2.9vw, 15px);
        }
        
        .calendar td {
            height: 48px;
            font-size: clamp(14px, 4vw, 18px);
            color: #1c2b27;
            background: #faf7ed;
            font-weight: 700;
        }
        
        .calendar td:empty {
            background: transparent;
        }
        
        .calendar td.today {
            background: linear-gradient(135deg, #f0d78c, #c9a84c);
            font-weight: 900;
            color: #1B5E20;
            box-shadow: 0 8px 18px rgba(201, 168, 76, 0.35);
        }
        
        .calendar td:not(:empty):hover {
            background-color: #e8f5e9;
        }

        .sidebar {
            display: none; 
            position: fixed;
            width: min(280px, 86vw);
            height: 100%;
            background-color: #f4f4f4;
            z-index: 1000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }

        .close-btn {
            cursor: pointer;
            font-size: 24px;
            color: #333;
            float: left;
        }

        @media (max-width: 600px) {
            body {
                overflow-x: hidden;
            }

            .header {
                padding: 22px 12px 28px;
                border-bottom-left-radius: 22px;
                border-bottom-right-radius: 22px;
            }

            .header h1 {
                font-size: 32px;
            }

            .header h2 {
                font-size: 17px;
            }

            #home-logo {
                width: 60px;
                height: 60px;
            }

            .menu-icon {
                font-size: 24px;
            }

            .container {
                width: calc(100% - 16px);
                padding-top: 12px;
            }

            .calendar {
                padding: 10px;
                border-radius: 18px;
            }

            .date-info {
                padding: 12px 10px;
                border-radius: 16px;
                margin-bottom: 12px;
            }

            .month-navigation {
                grid-template-columns: 1fr;
                gap: 8px;
            }

            .month-navigation .current-month {
                order: -1;
                min-width: auto;
            }

            .month-navigation button {
                width: 100%;
                padding: 11px 10px;
                font-size: 14px;
            }

            .calendar table {
                border-spacing: 3px;
            }

            .calendar th {
                font-size: 0;
                padding: 8px 2px;
            }

            .calendar th::first-letter {
                font-size: 13px;
            }

            .calendar td {
                height: 38px;
                border-radius: 9px;
                font-size: 15px;
            }
        }
    .home-logo-link{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;}
</style>

<body>

            العودة للصفحة الرئيسية
        </a>
    </div>

    <div class="header">
        <div class="menu-icon" onclick="openSidebar()">☰</div>
        <div>
            <h1>أهلّه</h1>
            <h2>التقويم الميلادي</h2>
        </div>
        <a href="index.html" class="home-logo-link"><img loading="lazy" decoding="async" id="home-logo" src="https://i.ibb.co/B59zjpGn/2.png" alt="صورة أهلّه"></a>
    </div>

    <div class="container">
        <div class="date-info">
            <p id="current-hijri-date">التاريخ الهجري الحالي: </p>
            <p id="current-gregorian-date">التاريخ الميلادي الحالي: </p>
        </div>
        
        <div class="calendar">
            <div class="month-navigation">
                <button onclick="previousMonth()">الشهر السابق</button>
                <div class="current-month" id="current-month">يناير 2023</div>
                <button onclick="nextMonth()">الشهر التالي</button>
            </div>
            
            <div class="calendar-table-wrap">
                <table>
                <thead>
                    <tr>
                        <th title="الأحد">أ</th>
                        <th title="الإثنين">إ</th>
                        <th title="الثلاثاء">ث</th>
                        <th title="الأربعاء">أ</th>
                        <th title="الخميس">خ</th>
                        <th title="الجمعة">ج</th>
                        <th title="السبت">س</th>
                    </tr>
                </thead>
                <tbody id="calendar-body">
                </tbody>
            </table>
            </div>
        </div>

    </div>

    <div class="footer">&copy; <span id="currentYear"></span> Ahlah </div>

    <div id="overlay" class="overlay" onclick="closePopup()"></div>

    <script>
        const arabicMonths = [
            "يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو",
            "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"
        ];
        
        const hijriMonths = [
            "محرم", "صفر", "ربيع الأول", "ربيع الثاني",
            "جمادى الأولى", "جمادى الآخرة", "رجب", "شعبان",
            "رمضان", "شوال", "ذو القعدة", "ذو الحجة"
        ];
        
        let currentMonth;
        let currentYear;
        
        function initCalendar() {
            const today = new Date();
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            
            updateCurrentDateDisplay();
            generateCalendar(currentYear, currentMonth);
        }
        
        function updateCurrentDateDisplay() {
            const today = new Date();
            const hijriDate = getHijriDate(today);
            
            document.getElementById('current-hijri-date').textContent = 
                `التاريخ الهجري الحالي: ${hijriDate.day} ${hijriDate.month} ${hijriDate.year} هـ`;
            document.getElementById('current-gregorian-date').textContent = 
                `التاريخ الميلادي الحالي: ${today.getDate()}/${today.getMonth() + 1}/${today.getFullYear()}`;
            document.getElementById('current-month').textContent = 
                `${arabicMonths[currentMonth]} ${currentYear}`;
        }
        
        function generateCalendar(year, month) {
            const calendarBody = document.getElementById('calendar-body');
            calendarBody.innerHTML = '';
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            const today = new Date();
            const currentDay = today.getDate();
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();
            
            let date = 1;
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('tr');
                
                for (let j = 0; j < 7; j++) {
                    const cell = document.createElement('td');
                    
                    if (i === 0 && j < firstDay) {
                        cell.textContent = '';
                    } else if (date > daysInMonth) {
                        cell.textContent = '';
                    } else {
                        cell.textContent = date;
                        
                        if (currentYear === year && currentMonth === month && currentDay === date) {
                            cell.classList.add('today');
                        }
                        
                        date++;
                    }
                    
                    row.appendChild(cell);
                }
                
                calendarBody.appendChild(row);
                
                if (date > daysInMonth) {
                    break;
                }
            }
        }
        
        function previousMonth() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            updateCurrentDateDisplay();
            generateCalendar(currentYear, currentMonth);
        }
        
        function nextMonth() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            updateCurrentDateDisplay();
            generateCalendar(currentYear, currentMonth);
        }
        
        function getHijriDate(date = new Date()) {
            try {
                const formatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric'
                });

                const parts = formatter.formatToParts(date);
                const day = parts.find(part => part.type === 'day')?.value || '';
                const month = parts.find(part => part.type === 'month')?.value || '';
                const year = parts.find(part => part.type === 'year')?.value || '';

                return { day, month, year };
            } catch (error) {
                return getHijriDateFallback(date);
            }
        }

        function getHijriDateFallback(date = new Date()) {
            const ISLAMIC_EPOCH = 1948439.5;
            
            function gregorianToJulianDay(y, m, d) {
                if (m <= 2) {
                    y -= 1;
                    m += 12;
                }
                const a = Math.floor(y / 100);
                const b = 2 - a + Math.floor(a / 4);
                return Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + d + b - 1524.5;
            }

            function julianDayFromHijri(year, month, day) {
                return (day + Math.ceil(29.5 * (month - 1)) + (year - 1) * 354 +
                    Math.floor((3 + (11 * year)) / 30) + ISLAMIC_EPOCH) - 1;
            }

            function julianDayToHijri(jd) {
                jd = Math.floor(jd) + 0.5;
                const year = Math.floor(((30 * (jd - ISLAMIC_EPOCH)) + 10646) / 10631);
                let month = Math.min(12, Math.ceil((jd - (29 + julianDayFromHijri(year, 1, 1))) / 29.5) + 1);
                if (jd < julianDayFromHijri(year, month, 1)) month--;
                const day = Math.floor((jd - julianDayFromHijri(year, month, 1)) + 1);
                return { day, month: hijriMonths[month - 1], year };
            }

            return julianDayToHijri(gregorianToJulianDay(date.getFullYear(), date.getMonth() + 1, date.getDate()));
        }

        function openSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.style.display = "block";
            sidebar.style.width = "250px";
        }

        function closeSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.style.width = "0";
            sidebar.style.display = "none";
        }

        function goToHomePage() {
            window.location.href = "index.html";
        }
        
        window.onload = function() {
            initCalendar();
        };
    </script>
