<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/KcqW6dRM/image.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أهلّه - التقويم الهجري</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2E7D32">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        .hijri-page-wrap {
            width: min(100% - 24px, 980px);
            margin-inline: auto;
            padding: 18px 0 28px;
        }

        .hijri-hero-card,
        .hijri-calendar-card {
            background: rgba(255, 255, 255, 0.94);
            border: 1px solid rgba(201, 168, 76, 0.28);
            box-shadow: 0 14px 40px rgba(27, 94, 32, 0.14);
            border-radius: 24px;
            overflow: hidden;
        }

        .hijri-hero-card {
            padding: 18px;
            margin-bottom: 18px;
            position: relative;
        }

        .hijri-hero-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 15% 10%, rgba(201,168,76,.12), transparent 35%),
                radial-gradient(circle at 85% 85%, rgba(46,125,50,.10), transparent 38%);
            pointer-events: none;
        }

        .hijri-hero-content {
            position: relative;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 14px;
            align-items: center;
        }

        .hijri-current-title {
            color: #1B5E20;
            font-size: clamp(21px, 5vw, 32px);
            font-weight: 900;
            margin-bottom: 8px;
        }

        .hijri-current-date {
            color: #2E7D32;
            font-size: clamp(17px, 4vw, 23px);
            font-weight: 800;
            line-height: 1.8;
        }

        .hijri-small-note {
            color: #60716c;
            font-size: clamp(13px, 3vw, 15px);
            line-height: 1.8;
            margin-top: 8px;
        }

       

        .hijri-calendar-card {
            padding: 18px;
        }

        .hijri-month-nav {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .hijri-month-nav button,
        .hijri-action-btn {
            border: 0;
            border-radius: 999px;
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            color: white;
            padding: 10px 14px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 800;
            font-size: 15px;
            box-shadow: 0 8px 18px rgba(46, 125, 50, 0.20);
            white-space: nowrap;
        }

        .hijri-month-nav button:hover,
        .hijri-action-btn:hover { filter: brightness(1.05); }

        .hijri-month-title {
            min-width: 145px;
            text-align: center;
            color: #1B5E20;
            font-size: clamp(18px, 4.7vw, 25px);
            font-weight: 900;
            line-height: 1.6;
        }

        .hijri-controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            align-items: center;
            margin: 10px 0 15px;
            padding: 10px;
            border-radius: 18px;
            background: rgba(250, 247, 237, 0.75);
            border: 1px solid rgba(201, 168, 76, 0.18);
        }

        .hijri-adjust-label {
            color: #2E7D32;
            font-weight: 800;
            font-size: 14px;
        }

        .hijri-adjust-btn {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1px solid rgba(46,125,50,.25);
            background: white;
            color: #1B5E20;
            font-size: 20px;
            font-weight: 900;
            cursor: pointer;
        }

        .hijri-table-wrap {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 18px;
        }

        .hijri-calendar-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 5px;
            table-layout: fixed;
        }

        .hijri-calendar-table th {
            background: linear-gradient(135deg, #1B5E20, #2E7D32);
            color: white;
            border-radius: 12px;
            padding: 10px 4px;
            font-size: clamp(12px, 3vw, 15px);
            font-weight: 800;
        }

        .hijri-calendar-table td {
            height: 62px;
            border-radius: 16px;
            background: #faf7ed;
            color: #1c2b27;
            border: 1px solid rgba(46, 125, 50, 0.08);
            vertical-align: middle;
            text-align: center;
            font-weight: 900;
            font-size: clamp(16px, 4.4vw, 22px);
            position: relative;
            transition: .2s ease;
        }

        .hijri-calendar-table td.empty-day {
            background: transparent;
            border-color: transparent;
        }

        .hijri-calendar-table td:not(.empty-day):hover {
            background: #e8f5e9;
            transform: translateY(-1px);
        }

        .hijri-calendar-table td.today {
            background: linear-gradient(135deg, #f0d78c, #c9a84c);
            color: #1B5E20;
            border-color: rgba(168, 134, 46, 0.55);
            box-shadow: 0 10px 24px rgba(201, 168, 76, 0.34);
        }

        .greg-subday {
            display: block;
            margin-top: 4px;
            color: #66736f;
            font-size: 11px;
            font-weight: 700;
        }

        .hijri-calendar-table td.today .greg-subday { color: #1B5E20; }

        .hijri-footer-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 16px;
        }

        .hijri-action-btn.secondary {
            background: linear-gradient(135deg, #f0d78c, #c9a84c);
            color: #1B5E20;
        }

        .sidebar {
            display: none;
            position: fixed;
            width: min(280px, 86vw);
            height: 100%;
            background-color: #f4f4f4;
            z-index: 1000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.5);
        }

        .close-btn {
            cursor: pointer;
            font-size: 24px;
            color: #333;
            float: left;
        }

        .home-logo-link{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;}

        @media (max-width: 640px) {
            .hijri-hero-content { grid-template-columns: 1fr; text-align: center; }
            .hijri-month-nav { grid-template-columns: 1fr 1fr; }
            .hijri-month-title { grid-column: 1 / -1; grid-row: 1; }
            .hijri-month-nav button { font-size: 13px; padding: 9px 10px; }
            .hijri-calendar-card { padding: 12px; border-radius: 20px; }
            .hijri-calendar-table { border-spacing: 3px; }
            .hijri-calendar-table th { font-size: 0; padding: 8px 2px; }
            .hijri-calendar-table th::first-letter { font-size: 13px; }
            .hijri-calendar-table td { height: 48px; border-radius: 12px; }
            .greg-subday { font-size: 9px; margin-top: 2px; }
        }
    </style>
</head>
<body>
    <floraspace><div class="zeeblox"></div></floraspace>

    <div id="sidebar" class="sidebar">
        <a href="javascript:void(0)" class="close-btn" onclick="closeSidebar()">×</a>
        <a href="index.html"> 
            <img loading="lazy" decoding="async" src="https://i.ibb.co/yPXjrLy/image.png" alt="العودة للصفحة الرئيسية">
            العودة للصفحة الرئيسية
        </a>
    </div>

    <div class="header">
        <div class="menu-icon" onclick="openSidebar()">☰</div>
        <div>
            <h1>أهلّه</h1>
            <h2>التقويم الهجري</h2>
        </div>
        <a href="index.html" class="home-logo-link"><img loading="lazy" decoding="async" id="home-logo" src="https://i.ibb.co/B59zjpGn/2.png" alt="صورة أهلّه"></a>
    </div>

    <main class="hijri-page-wrap">
        <section class="hijri-hero-card">
            <div class="hijri-hero-content">
                <div>
                    <div class="hijri-current-title">تاريخ اليوم الهجري</div>
                    <div id="todayHijriText" class="hijri-current-date">جارٍ التحميل...</div>
                    <div id="todayGregorianText" class="hijri-small-note"></div>
                </div>
            </div>
        </section>

        <section class="hijri-calendar-card">
            <div class="hijri-month-nav">
                <button type="button" onclick="previousHijriMonth()">الشهر السابق</button>
                <div id="hijriMonthTitle" class="hijri-month-title">...</div>
                <button type="button" onclick="nextHijriMonth()">الشهر التالي</button>
            </div>

            <div class="hijri-controls">
                <span class="hijri-adjust-label">تعديل الرؤية:</span>
                <button class="hijri-adjust-btn" type="button" onclick="changeHijriOffset(-1)">−</button>
                <span id="hijriOffsetText" class="hijri-adjust-label">0 يوم</span>
                <button class="hijri-adjust-btn" type="button" onclick="changeHijriOffset(1)">+</button>
                <button class="hijri-action-btn secondary" type="button" onclick="resetHijriOffset()">إعادة الضبط</button>
            </div>

            <div class="hijri-table-wrap">
                <table class="hijri-calendar-table">
                    <thead>
                        <tr>
                            <th title="الأحد">أ</th>
                            <th title="الإثنين">إ</th>
                            <th title="الثلاثاء">ث</th>
                            <th title="الأربعاء">أ</th>
                            <th title="الخميس">خ</th>
                            <th title="الجمعة">ج</th>
                            <th title="السبت">س</th>
                        </tr>
                    </thead>
                    <tbody id="hijriCalendarBody"></tbody>
                </table>
            </div>

           
        </section>
    </main>

    <div class="footer">&copy; <span id="currentYear"></span> Ahlah </div>

    <script>
        const hijriMonthNames = [
            "محرم", "صفر", "ربيع الأول", "ربيع الآخر", "جمادى الأولى", "جمادى الآخرة",
            "رجب", "شعبان", "رمضان", "شوال", "ذو القعدة", "ذو الحجة"
        ];

        const gregMonthNames = [
            "يناير", "فبراير", "مارس", "أبريل", "مايو", "يونيو",
            "يوليو", "أغسطس", "سبتمبر", "أكتوبر", "نوفمبر", "ديسمبر"
        ];

        const hijriFormatter = new Intl.DateTimeFormat("ar-SA-u-ca-islamic-umalqura-nu-latn", {
            year: "numeric",
            month: "numeric",
            day: "numeric"
        });

        let hijriOffset = Number(localStorage.getItem("ahlahHijriOffset") || 0);
        let displayedHijriAnchor = new Date();
        let currentBounds = null;

        function shiftedDate(date) {
            const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            d.setDate(d.getDate() + hijriOffset);
            return d;
        }

        function parseHijriParts(date) {
            const parts = hijriFormatter.formatToParts(shiftedDate(date));
            const out = {};
            parts.forEach(part => {
                if (part.type === "year") out.year = parseInt(part.value, 10);
                if (part.type === "month") out.month = parseInt(part.value, 10);
                if (part.type === "day") out.day = parseInt(part.value, 10);
            });
            return out;
        }

        function sameHijriMonth(a, b) {
            const pa = parseHijriParts(a);
            const pb = parseHijriParts(b);
            return pa.year === pb.year && pa.month === pb.month;
        }

        function addDays(date, amount) {
            const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
            d.setDate(d.getDate() + amount);
            return d;
        }

        function findHijriMonthBounds(anchorDate) {
            let first = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), anchorDate.getDate());
            while (sameHijriMonth(first, addDays(first, -1))) first = addDays(first, -1);

            let last = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), anchorDate.getDate());
            while (sameHijriMonth(last, addDays(last, 1))) last = addDays(last, 1);

            return { first, last };
        }

        function formatGregorianShort(date) {
            return `${date.getDate()} ${gregMonthNames[date.getMonth()]}`;
        }

        function updateTodayText() {
            const today = new Date();
            const h = parseHijriParts(today);
            document.getElementById("todayHijriText").textContent = `${h.day} ${hijriMonthNames[h.month - 1]} ${h.year} هـ`;
            document.getElementById("todayGregorianText").textContent = `الموافق: ${today.getDate()} ${gregMonthNames[today.getMonth()]} ${today.getFullYear()}م`;
            document.getElementById("hijriOffsetText").textContent = hijriOffset === 0 ? "0 يوم" : `${hijriOffset > 0 ? "+" : ""}${hijriOffset} يوم`;
        }

        function renderHijriCalendar(anchorDate = displayedHijriAnchor) {
            displayedHijriAnchor = new Date(anchorDate.getFullYear(), anchorDate.getMonth(), anchorDate.getDate());
            currentBounds = findHijriMonthBounds(displayedHijriAnchor);
            const monthInfo = parseHijriParts(displayedHijriAnchor);
            const monthName = hijriMonthNames[monthInfo.month - 1] || "";
            document.getElementById("hijriMonthTitle").textContent = `${monthName} ${monthInfo.year} هـ`;

            const tbody = document.getElementById("hijriCalendarBody");
            tbody.innerHTML = "";

            const today = new Date();
            const todayKey = today.toDateString();
            let row = document.createElement("tr");

            for (let i = 0; i < currentBounds.first.getDay(); i++) {
                const td = document.createElement("td");
                td.className = "empty-day";
                row.appendChild(td);
            }

            let current = new Date(currentBounds.first);
            while (current <= currentBounds.last) {
                if (row.children.length === 7) {
                    tbody.appendChild(row);
                    row = document.createElement("tr");
                }

                const h = parseHijriParts(current);
                const td = document.createElement("td");
                td.innerHTML = `${h.day}<span class="greg-subday">${formatGregorianShort(current)}</span>`;

                if (current.toDateString() === todayKey) td.classList.add("today");
                row.appendChild(td);
                current = addDays(current, 1);
            }

            while (row.children.length < 7) {
                const td = document.createElement("td");
                td.className = "empty-day";
                row.appendChild(td);
            }
            tbody.appendChild(row);
            updateTodayText();
        }

        function previousHijriMonth() {
            if (!currentBounds) currentBounds = findHijriMonthBounds(displayedHijriAnchor);
            renderHijriCalendar(addDays(currentBounds.first, -1));
        }

        function nextHijriMonth() {
            if (!currentBounds) currentBounds = findHijriMonthBounds(displayedHijriAnchor);
            renderHijriCalendar(addDays(currentBounds.last, 1));
        }

        function goTodayHijri() {
            renderHijriCalendar(new Date());
        }

        function changeHijriOffset(amount) {
            hijriOffset = Math.max(-2, Math.min(2, hijriOffset + amount));
            localStorage.setItem("ahlahHijriOffset", String(hijriOffset));
            renderHijriCalendar(displayedHijriAnchor);
        }

        function resetHijriOffset() {
            hijriOffset = 0;
            localStorage.setItem("ahlahHijriOffset", "0");
            renderHijriCalendar(displayedHijriAnchor);
        }

        function openSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.style.display = "block";
            sidebar.style.width = "250px";
        }

        function closeSidebar() {
            const sidebar = document.getElementById("sidebar");
            sidebar.style.width = "0";
            sidebar.style.display = "none";
        }

        window.addEventListener("load", () => renderHijriCalendar(new Date()));
    </script>
    <script src="script.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .catch((error) => console.log('Service Worker registration failed:', error));
        });
      }
    </script>
</body>
</html>
